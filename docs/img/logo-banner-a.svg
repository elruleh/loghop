<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">loghop banner</title>
  <desc id="desc">Terminal-style loghop wordmark with a session loop panel about capturing, redacting, handing off, and resuming AI coding sessions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050B14"/>
      <stop offset="55%" stop-color="#08111D"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="28%" cy="48%" r="68%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="48%" stop-color="#22D3EE" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#22D3EE" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <pattern id="scan" width="1200" height="22" patternUnits="userSpaceOnUse">
      <path d="M0 1H1200" stroke="#FFFFFF" stroke-opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="280" rx="28" fill="url(#cyanGlow)"/>
  <rect width="1200" height="280" rx="28" fill="url(#grid)" opacity="0.9"/>
  <rect width="1200" height="280" rx="28" fill="url(#scan)" opacity="0.65"/>

  <g font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <g transform="translate(74 52)">
      <text x="0" y="78" fill="#E6FDFF" font-size="88" font-weight="800" letter-spacing="-8">loghop<tspan fill="#22D3EE">_</tspan></text>
      <text x="4" y="126" fill="#DFFBFF" font-size="24" font-weight="700" letter-spacing="-0.8">capture → redact → handoff → resume</text>
      <text x="4" y="162" fill="#9FB6D3" font-size="20" font-weight="500" letter-spacing="-0.6">shared context across AI coding assistants</text>
    </g>

    <g transform="translate(720 44)">
      <rect x="0" y="0" width="410" height="192" rx="18" fill="#07111E" fill-opacity="0.82" stroke="#7DD3FC" stroke-opacity="0.22"/>
      <text x="28" y="40" fill="#7DD3FC" font-size="13" font-weight="800" letter-spacing="2.2">SESSION LOOP</text>
      <g font-size="17" font-weight="500" letter-spacing="-0.45">
        <text x="28" y="80" fill="#22D3EE" font-weight="800">›</text>
        <text x="60" y="80" fill="#C7D9EE">assistant run captured</text>
        <text x="28" y="110" fill="#22D3EE" font-weight="800">›</text>
        <text x="60" y="110" fill="#C7D9EE">context redacted locally</text>
        <text x="28" y="140" fill="#22D3EE" font-weight="800">›</text>
        <text x="60" y="140" fill="#C7D9EE">handoff built by loghop</text>
        <text x="28" y="170" fill="#22D3EE" font-weight="800">›</text>
        <text x="60" y="170" fill="#C7D9EE">next assistant resumes</text>
      </g>
    </g>
  </g>
</svg>
