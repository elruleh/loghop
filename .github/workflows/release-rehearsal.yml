name: release rehearsal

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to rehearse, e.g. 0.1.0"
        required: true
        type: string
      publish_testpypi:
        description: "Publish artifacts to TestPyPI and smoke the published package"
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  rehearse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4020542f2d0e4  # v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv==0.5.9
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Verify input version matches package version
        run: |
          expected="$(uv run python -c 'from loghop import __version__; print(__version__)')"
          if [ "${{ inputs.version }}" != "${expected}" ]; then
            echo "Input version ${{ inputs.version }} does not match package version ${expected}" >&2
            exit 1
          fi
      - name: Release QA Gates
        run: bash scripts/release_check.sh qa
      - name: Artifact Build And Smoke
        run: bash scripts/release_check.sh artifacts
      - name: Upload rehearsed artifacts
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808  # v4
        with:
          name: rehearsal-dist
          path: dist/*
      - name: Publish to TestPyPI
        if: inputs.publish_testpypi
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
      - name: Smoke published package from TestPyPI
        if: inputs.publish_testpypi
        run: bash scripts/smoke_published.sh --version "${{ inputs.version }}" --repository testpypi
