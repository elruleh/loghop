name: CodeQL

# NOTE: `pull_request` trigger removed on purpose. Running CodeQL on PRs
# caused inline `github-advanced-security[bot]` comments on every PR,
# which is pure noise for a solo maintainer. Coverage is preserved via
# the `push` (main) and weekly `schedule` runs; any finding still shows
# up under Security > Code scanning alerts.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly on Mondays at 06:00 UTC

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
