name: All Contributors

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  all-contributors:
    runs-on: ubuntu-latest
    steps:
      - name: Add new contributors
        uses: all-contributors-cli/all-contributors-cli@v1.0.0
        with:
          repo: elruleh/loghop
          branch: main
          # Only run when a contributor appears
          # This generates/updates a .all-contributorsrc file
          # and the contributors table in the README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
