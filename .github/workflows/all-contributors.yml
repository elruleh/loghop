name: All Contributors

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  all-contributors:
    if: ${{ hashFiles('.all-contributorsrc') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Add new contributors
        uses: JoshuaKGoldberg/all-contributors-auto-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
