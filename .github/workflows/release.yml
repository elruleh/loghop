name: release

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv==0.5.9
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Release QA Gates
        run: bash scripts/release_check.sh qa
      - name: Verify tag matches package version
        run: |
          expected="v$(uv run python -c 'from loghop import __version__; print(__version__)')"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${expected}" >&2
            exit 1
          fi
      - name: Artifact Build And Smoke
        run: bash scripts/release_check.sh artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  smoke-pypi:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv==0.5.9
      - name: Smoke published package from PyPI
        run: bash scripts/smoke_published.sh --version "${GITHUB_REF_NAME#v}" --repository pypi

  github-release:
    needs: [build, publish-pypi, smoke-pypi]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
