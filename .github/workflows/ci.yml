name: ci

# Triggers deduped: ``push`` only on ``main`` (post-merge safety net) so a
# push to a PR branch no longer fires a redundant run alongside the
# ``pull_request`` event. Cuts CI time ~50% on PR branches.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure git
        run: |
          git config --global user.email ci@example.com
          git config --global user.name "CI"
      - name: Install uv
        run: python -m pip install uv==0.11.17
      - name: Cache uv
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Release QA Gates
        run: bash scripts/release_check.sh qa

  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv==0.11.17
      - name: Cache uv
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Artifact Build And Smoke
        run: bash scripts/release_check.sh artifacts
