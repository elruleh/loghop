name: ci

on: [push, pull_request]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4020542f2d0e4  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Configure git
        run: |
          git config --global user.email ci@example.com
          git config --global user.name "CI"
      - name: Install uv
        run: python -m pip install uv==0.5.9
      - name: Cache uv
        uses: actions/cache@0c907a75c2c80ebcb7f088228cd535afd7b9c247  # v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Release QA Gates
        run: bash scripts/release_check.sh qa

  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4020542f2d0e4  # v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv==0.5.9
      - name: Cache uv
        uses: actions/cache@0c907a75c2c80ebcb7f088228cd535afd7b9c247  # v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Artifact Build And Smoke
        run: bash scripts/release_check.sh artifacts
