name: Close stale issues and PRs
#
# Scope: marks issues/PRs as stale after a long quiet period and
# closes them if no follow-up arrives. Intended for low-signal
# traffic, not active bug reports.
#
# Maintenance:
#   - `days-before-stale` is intentionally high (60d) to avoid
#     closing legitimate user reports before the maintainer has
#     a chance to triage them.
#   - As the project grows, prefer a per-label policy that opts
#     `bug` and `security` out of the auto-close.

on:
  schedule:
    - cron: "0 0 * * *"  # daily at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark and close stale issues
        uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,discussion,good first issue"
          exempt-pr-labels: "pinned,security,work-in-progress"
          comment-issue: "This issue has been automatically marked as stale because it has had no activity for 60 days. It will be closed in 14 days if no further activity occurs. If this is still relevant, please comment to keep it open."
          comment-pr: "This PR has been automatically marked as stale because it has had no activity for 60 days. It will be closed in 14 days if no further activity occurs. If you're still working on it, please comment to keep it open."
