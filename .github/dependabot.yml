# Dependabot weekly updates. Grouping keeps the PR queue short, and the
# ``dependabot-auto-merge.yml`` workflow merges minor/patch bumps
# automatically once CI is green. Major bumps are grouped separately and
# left for human review (breaking changes can slip past the test gate).
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Major bumps of runtime deps fall outside the group above and open as
    # standalone PRs so the auto-merge workflow can hold them for review.
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      github-actions-major:
        patterns:
          - "*"
        update-types:
          - "major"
    open-pull-requests-limit: 2
